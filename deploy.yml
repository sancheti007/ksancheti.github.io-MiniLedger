name: Deploy Shop Ledger to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Angular app for GitHub Pages
        working-directory: frontend
        run: |
          npx ng build --configuration production --base-href "/${{ github.event.repository.name }}/"
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"

      - name: Copy dist to docs folder (GitHub Pages)
        run: |
          cp -r frontend/dist/shop-ledger-frontend/browser ./docs

      - name: Add .nojekyll to prevent Jekyll processing
        run: touch docs/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
